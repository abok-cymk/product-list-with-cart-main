<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Product list with cart</title>

    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <main>
      <div><h1 class="product-list-heading">Desserts</h1></div>
      <div class="card-container" id="card-container">
        
      </div>
      <div class="cart-checkout">
        <div>
          <h4 class="checkout-heading">Your Cart (0)</h4>
          <div>
            <img class="illustration" src="/assets/images/illustration-empty-cart.svg" alt="">
          </div>
          <p class="checkout-desc">Your added items will appear here</p>
        </div>
      </div>
    </main>
    <script src="/js/main.js"></script>
  </body>
</html>
